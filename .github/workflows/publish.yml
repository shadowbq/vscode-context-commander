name: Publish Extension

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Package only (do not publish or release)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    name: Build, Package & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build (minified)
        run: npm run build

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Package extension (.vsix)
        run: npm run package
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Locate .vsix artifact
        id: vsix
        run: |
          VSIX=$(ls *.vsix | head -1)
          echo "path=$VSIX" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npx @vscode/vsce publish --packagePath "${{ steps.vsix.outputs.path }}"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          files: ${{ steps.vsix.outputs.path }}
          fail_on_unmatched_files: true
