name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Lint, Type-check & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Integration tests spin up a real VS Code instance via Electron/xvfb
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install xvfb (virtual display for Electron)
        run: sudo apt-get install -y xvfb

      - name: Compile extension & test sources
        run: npm run compile && npm run compile:test

      - name: Run integration tests
        run: xvfb-run -a npm run test:integration
